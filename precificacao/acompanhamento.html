<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sua implantação · Elofy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--accent:#7C6FFF;--accent2:#6457E6;--ink:#1C2030;--ink2:#5A6178;--ink3:#9AA0B4;
    --line:#E6E8F0;--soft:#F0EEFF;--surf:#F8F9FC;--green:#15803D;--greenbg:#E9F8EF;
    --gold:#9a6b00;--goldbg:#FEF6E7;--red:#DC2626;--redbg:#FDECEC}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',system-ui,sans-serif;color:var(--ink);font-size:14px;line-height:1.55;
    background:#EEF0F6;padding:24px 14px}
  .wrap{max-width:720px;margin:0 auto}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px;
    box-shadow:0 4px 24px rgba(30,32,48,.06);margin-bottom:18px}
  .top{display:flex;justify-content:space-between;align-items:flex-start;
    border-bottom:2px solid var(--accent);padding-bottom:16px;margin-bottom:20px}
  .brand .tag{font-size:11px;color:var(--ink3);letter-spacing:.18em;text-transform:uppercase;margin-top:4px}
  .doc{text-align:right;font-size:11px;color:var(--ink2)}
  .doc .big{font-size:15px;font-weight:600;color:var(--ink)}
  h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
  h1 span{color:var(--accent)}
  .sub{color:var(--ink2);margin-top:6px}
  /* Stepper */
  .stepper{display:flex;align-items:flex-start;margin:26px 0;gap:0}
  .step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:none;width:90px;text-align:center}
  .step .dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;background:var(--surf);border:2px solid var(--line);color:var(--ink3)}
  .step.done .dot{background:var(--green);border-color:var(--green);color:#fff}
  .step.now .dot{background:var(--accent);border-color:var(--accent);color:#fff;
    box-shadow:0 0 0 5px var(--soft)}
  .step .lbl{font-size:10px;color:var(--ink3);font-weight:600}
  .step.now .lbl{color:var(--accent2)}
  .step.done .lbl{color:var(--green)}
  .lin{flex:1;height:2px;background:var(--line);margin-top:17px;min-width:8px}
  .lin.done{background:var(--green)}
  /* Meta */
  .meta{display:flex;gap:26px;flex-wrap:wrap;background:var(--surf);border:1px solid var(--line);
    border-radius:12px;padding:15px 18px;margin:14px 0}
  .meta .k{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em}
  .meta .val{font-weight:600;font-size:14px;margin-top:2px}
  /* Timeline */
  h2.sec{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);
    margin:24px 0 12px;font-weight:700}
  .up{border-left:3px solid var(--accent);background:var(--surf);border-radius:0 10px 10px 0;
    padding:12px 16px;margin-bottom:10px}
  .up.etapa{border-left-color:var(--green);background:var(--greenbg)}
  .up .quando{font-size:11px;color:var(--ink3);margin-bottom:3px}
  .up .txt{color:var(--ink2)}
  .center{text-align:center;padding:40px 20px;color:var(--ink2)}
  .pitch{background:var(--soft);border-radius:12px;padding:14px 18px;margin-top:18px;
    color:var(--accent2);font-size:13px;text-align:center}
  .foot{text-align:center;font-size:11px;color:var(--ink3);margin-top:6px}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="card"><div class="center" id="loading">Carregando o andamento da sua implantação…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data/supabase.js"></script>
<script src="src/pdf.js?v=20260601a"></script>
<script src="src/acompanhamento.js?v=20260601a"></script>
</body>
</html>
