<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sua implantação · Elofy</title>
<!-- Marca oficial Elofy: paleta + fontes (Gotham Cond / Gellix) -->
<link rel="stylesheet" href="brand/elofy.css?v=20260602b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:var(--brand-ink);--ink2:var(--brand-ink-2);--ink3:var(--brand-ink-3);
    --line:#E3E0DE;--soft:var(--elofy-blue-08);--surf:#FAF8F7;
    --green:#15803D;--greenbg:#E9F8EF;--gold:#9a6b00;--goldbg:#FEF6E7;--red:#DC2626;--redbg:#FDECEC}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-texto);color:var(--ink);font-size:14px;line-height:1.55;
    background:var(--soft-gray);padding:24px 14px}
  .wrap{max-width:720px;margin:0 auto}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px;
    box-shadow:0 4px 24px rgba(0,27,166,.07);margin-bottom:18px}
  .top{display:flex;justify-content:space-between;align-items:flex-start;
    border-bottom:3px solid var(--elofy-blue);padding-bottom:18px;margin-bottom:22px}
  .brand img{height:44px;display:block}
  .brand .tag{font-family:var(--font-titulo);text-transform:uppercase;font-size:12px;
    color:var(--ink3);letter-spacing:.18em;margin-top:8px}
  .doc{text-align:right;font-size:11px;color:var(--ink2)}
  .doc .big{font-family:var(--font-titulo);text-transform:uppercase;font-size:16px;
    letter-spacing:.05em;color:var(--elofy-blue)}
  h1{font-family:var(--font-titulo);text-transform:uppercase;font-size:28px;font-weight:700;
    letter-spacing:.01em;line-height:1.15;color:var(--elofy-blue)}
  h1 span{background:var(--amarelofy);padding:0 6px}
  .sub{color:var(--ink2);margin-top:8px}
  /* Stepper de etapas */
  .stepper{display:flex;align-items:flex-start;margin:28px 0;gap:0}
  .step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:none;width:90px;text-align:center}
  .step .dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;background:var(--surf);border:2px solid var(--line);color:var(--ink3)}
  .step.done .dot{background:var(--green);border-color:var(--green);color:#fff}
  .step.now .dot{background:var(--elofy-blue);border-color:var(--elofy-blue);color:var(--amarelofy);
    box-shadow:0 0 0 5px var(--elofy-blue-15)}
  .step .lbl{font-family:var(--font-titulo);text-transform:uppercase;font-size:9px;
    color:var(--ink3);font-weight:500;letter-spacing:.04em}
  .step.now .lbl{color:var(--elofy-blue);font-weight:700}
  .step.done .lbl{color:var(--green)}
  .step .dias{font-size:10px;font-weight:700;color:var(--ink2);background:var(--surf);
    border:1px solid var(--line);border-radius:99px;padding:1px 8px;margin-top:2px}
  .step.done .dias{color:var(--green);background:var(--greenbg);border-color:#C9EDD6}
  .step.now .dias{color:var(--elofy-blue);background:var(--amarelofy);border-color:var(--amarelofy)}
  .lin{flex:1;height:2px;background:var(--line);margin-top:18px;min-width:8px}
  .lin.done{background:var(--green)}
  /* Meta */
  .meta{display:flex;gap:26px;flex-wrap:wrap;background:var(--surf);border:1px solid var(--line);
    border-radius:14px;padding:16px 20px;margin:14px 0}
  .meta .k{font-family:var(--font-titulo);text-transform:uppercase;font-size:10px;
    color:var(--ink3);letter-spacing:.08em}
  .meta .val{font-weight:600;font-size:14px;margin-top:2px}
  /* Time Elofy — cards com foto, contato e CTA */
  .tm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
  @media(max-width:560px){.tm-grid{grid-template-columns:1fr}}
  .tm-card{display:flex;gap:14px;align-items:flex-start;background:var(--elofy-blue);
    border-radius:16px;padding:16px 18px}
  .tm-foto{width:64px;height:64px;border-radius:50%;object-fit:cover;flex:none;
    border:3px solid var(--amarelofy);background:#fff}
  .tm-iniciais{display:flex;align-items:center;justify-content:center;
    font-family:var(--font-titulo);font-size:22px;font-weight:700;color:var(--elofy-blue);
    background:var(--amarelofy)}
  .tm-rotulo{font-family:var(--font-titulo);text-transform:uppercase;font-size:10px;
    color:var(--amarelofy);letter-spacing:.08em}
  .tm-nome{color:#fff;font-weight:700;font-size:16px;margin-top:2px}
  .tm-cargo{color:rgba(255,255,255,.75);font-size:11px;margin-top:1px}
  .tm-ctas{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .tm-cta{font-size:11px;font-weight:700;text-decoration:none;border-radius:99px;
    padding:6px 14px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
  .tm-cta:hover{background:rgba(255,255,255,.28)}
  .tm-cta.zap{background:#25D366;border-color:#25D366;color:#fff}
  /* Customizações com status */
  .cu-item{border:1px solid var(--line);border-left:4px solid var(--magenta);border-radius:0 12px 12px 0;
    padding:13px 17px;margin-bottom:10px;background:var(--surf)}
  .cu-nome{font-weight:600;font-size:14px}
  .cu-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:7px}
  .cu-status{font-size:11px;font-weight:700;padding:3px 11px;border-radius:99px}
  .cu-status.wait{color:var(--ink3);background:#EDEAE8}
  .cu-status.info{color:var(--elofy-blue);background:var(--elofy-blue-08)}
  .cu-status.warn{color:var(--gold);background:var(--goldbg)}
  .cu-status.ok{color:var(--green);background:var(--greenbg)}
  .cu-prev{font-size:12px;color:var(--ink2);font-weight:600}
  .cu-prev.sem{color:var(--ink3);font-weight:400;font-style:italic}
  .cu-obs{font-size:12px;color:var(--ink3);margin-top:6px;font-style:italic}
  /* Escalonamento */
  .esc-box{border:2px dashed var(--line);border-radius:16px;padding:20px 22px;margin-top:24px;text-align:center}
  .esc-box b{font-family:var(--font-titulo);text-transform:uppercase;font-size:16px;
    letter-spacing:.03em;color:var(--ink)}
  .esc-box p{color:var(--ink2);font-size:13px;margin:8px auto 14px;max-width:480px}
  .esc-box.escalado{border-style:solid;border-color:var(--red);background:var(--redbg)}
  .esc-box.escalado b{color:var(--red)}
  .esc-btn{font-family:var(--font-titulo);text-transform:uppercase;letter-spacing:.05em;
    font-size:14px;font-weight:700;cursor:pointer;color:var(--red);background:#fff;
    border:2px solid var(--red);border-radius:12px;padding:12px 26px}
  .esc-btn:hover{background:var(--redbg)}
  .esc-btn.enviar{background:var(--red);color:#fff;width:100%;margin-top:10px}
  .esc-form{margin-top:16px;text-align:left}
  .esc-form.hide{display:none}
  .esc-form textarea,.esc-form input{width:100%;font-family:var(--font-texto);font-size:14px;
    border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:#fff;
    color:var(--ink);margin-bottom:10px}
  .esc-form textarea{min-height:90px;resize:vertical}
  .esc-form textarea:focus,.esc-form input:focus{outline:none;border-color:var(--red)}
  .esc-msg{font-size:12px;color:var(--red);text-align:center;margin-top:8px}
  .esc-ok{background:var(--greenbg);border-radius:12px;padding:16px;color:var(--green);
    font-size:14px;text-align:center}
  .hide{display:none}
  /* Timeline */
  h2.sec{font-family:var(--font-titulo);text-transform:uppercase;font-size:15px;
    letter-spacing:.06em;color:var(--elofy-blue);margin:26px 0 12px;font-weight:700}
  .up{border-left:4px solid var(--elofy-blue);background:var(--surf);border-radius:0 12px 12px 0;
    padding:13px 17px;margin-bottom:10px}
  .up.etapa{border-left-color:var(--green);background:var(--greenbg)}
  .up .quando{font-size:11px;color:var(--ink3);margin-bottom:3px}
  .up .txt{color:var(--ink2)}
  .center{text-align:center;padding:40px 20px;color:var(--ink2)}
  .pitch{background:var(--magenta-soft);border-radius:14px;padding:16px 20px;margin-top:20px;
    color:var(--ink);font-size:13px;text-align:center}
  .foot{text-align:center;font-size:11px;color:var(--ink3);margin-top:6px}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="card"><div class="center" id="loading">Carregando o andamento da sua implantação…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data/supabase.js"></script>
<script src="src/pdf.js?v=20260602b"></script>
<script src="src/acompanhamento.js?v=20260602b"></script>
</body>
</html>
